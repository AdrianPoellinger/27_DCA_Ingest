
name: combined-env
channels:
  - conda-forge
dependencies:
  - python=3.10
  - openjdk=17
  - maven
  - pip
  - exiftool
  - pip:
      - jupyterlab
      - ipykernel       # Kernel-Registrierung: python -m ipykernel install --user --name combined-env
      - ipywidgets      # Notebook-Widgets
      - pandas
      - matplotlib
      - seaborn
      - pywaffle
      - rdflib
      - networkx        # Provenance-Graphen (optional)
